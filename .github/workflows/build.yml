name: Build FanControl.LianLi

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet publish

      - name: Publish binaries
        if: success()
        run: |
          mkdir -p build/Normal build/ARGB
          cp FanControl.LianLiPlugin/bin/Release/net10.0/publish/* build/Normal
          cp FanControl.LianLiPlugin.ARGB/bin/Release/net10.0/publish/* build/ARGB
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FanControl.LianLiPlugin
          path: build/
