name: Build FanControl.LianLi

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet publish

      - name: Publish binaries
        if: success()
        run: |
          mkdir -p build/Normal build/ARGB
          cp FanControl.LianLiPlugin/bin/Release/net10.0/publish/* build/Normal
          cp FanControl.LianLiPlugin.ARGB/bin/Release/net10.0/publish/* build/ARGB
        shell: bash

      - name: Upload normal artifact
        uses: actions/upload-artifact@v7
        with:
          name: FanControl.LianLiPlugin
          path: build/Normal/
          if-no-files-found: "error"
          
      - name: Upload ARGB artifact
        uses: actions/upload-artifact@v7
        with:
          name: FanControl.LianLiPlugin.ARGB
          path: build/ARGB/
          if-no-files-found: "error"
